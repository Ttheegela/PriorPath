version: "3.9"

services:
  app:
    build: .
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - LANGCHAIN_TRACING_V2=false
    depends_on:
      qdrant:
        condition: service_started
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8001 --reload

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6334:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
