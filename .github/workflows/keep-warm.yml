name: Keep Warm

on:
  schedule:
    - cron: "*/14 * * * *"   # every 14 min — Render free tier spins down after 15 min idle
  workflow_dispatch:          # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://priorpath-8prs.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: health check returned $STATUS"
            exit 1
          fi
